version: '3.9'

services:

  # ── PostgreSQL Database ──────────────────────
  db:
    image: postgres:15-alpine
    container_name: sinilai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: nilaidb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nilaidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Web App ────────────────────────────
  web:
    build: .
    container_name: sinilai_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/nilaidb
      SECRET_KEY: sinilai-super-secret-key-2024-ganti-di-production
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app          # Hot reload saat development
    command: python app.py

volumes:
  postgres_data:
    driver: local
