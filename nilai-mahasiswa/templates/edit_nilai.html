{% extends "base.html" %}
{% block title %}Edit Nilai{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <p class="page-eyebrow"><a href="{{ url_for('dosen_nilai') }}">← Manajemen Nilai</a></p>
    <h1 class="page-title">Edit Nilai</h1>
  </div>
</div>

<div class="form-card">
  <div class="edit-info-bar">
    <div class="edit-info-item">
      <span class="edit-info-label">Mahasiswa</span>
      <span class="edit-info-val">{{ nilai.mahasiswa.nama }} ({{ nilai.mahasiswa.nim_nip }})</span>
    </div>
    <div class="edit-info-item">
      <span class="edit-info-label">Mata Kuliah</span>
      <span class="edit-info-val">{{ nilai.mata_kuliah.nama }}</span>
    </div>
  </div>

  <form method="POST" action="{{ url_for('edit_nilai', nilai_id=nilai.id) }}">

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nilai Angka (0–100)</label>
        <input type="number" name="nilai_angka" class="form-input" min="0" max="100" step="0.5"
               value="{{ nilai.nilai_angka }}" id="nilaiInput" oninput="updatePreview()" required>
        <div class="nilai-preview" id="nilaiPreview"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Semester</label>
        <select name="semester" class="form-input" required>
          <option value="Ganjil" {% if nilai.semester == 'Ganjil' %}selected{% endif %}>Ganjil</option>
          <option value="Genap" {% if nilai.semester == 'Genap' %}selected{% endif %}>Genap</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tahun Ajaran</label>
        <select name="tahun_ajaran" class="form-input" required>
          <option value="2024/2025" {% if nilai.tahun_ajaran == '2024/2025' %}selected{% endif %}>2024/2025</option>
          <option value="2023/2024" {% if nilai.tahun_ajaran == '2023/2024' %}selected{% endif %}>2023/2024</option>
          <option value="2022/2023" {% if nilai.tahun_ajaran == '2022/2023' %}selected{% endif %}>2022/2023</option>
        </select>
      </div>
      <div class="form-group"></div>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('dosen_nilai') }}" class="btn-secondary">Batal</a>
      <button type="submit" class="btn-primary">Simpan Perubahan</button>
    </div>
  </form>
</div>

<script>
function angkaToHuruf(n) {
  if (n >= 85) return 'A'; if (n >= 80) return 'A-'; if (n >= 75) return 'B+';
  if (n >= 70) return 'B'; if (n >= 65) return 'B-'; if (n >= 60) return 'C+';
  if (n >= 55) return 'C'; if (n >= 50) return 'C-'; if (n >= 45) return 'D';
  return 'E';
}
function updatePreview() {
  const v = parseFloat(document.getElementById('nilaiInput').value);
  const p = document.getElementById('nilaiPreview');
  if (!isNaN(v)) {
    const h = angkaToHuruf(v);
    p.innerHTML = `Nilai huruf: <span class="grade-badge grade-${h[0]}">${h}</span>`;
  }
}
updatePreview();
</script>
{% endblock %}
